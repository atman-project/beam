name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Releases shouldn't be cancelled mid-upload by a follow-up tag push.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  desktop:
    name: Desktop - ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            # Universal binary covers both Apple Silicon and Intel from one .dmg.
            args: "--target universal-apple-darwin"
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # tauri-action runs `tauri build`, uploads installers to a draft
      # release matching the tag, and creates the release if it doesn't
      # exist. Publish the draft manually after smoke-testing the binaries.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Beam ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
