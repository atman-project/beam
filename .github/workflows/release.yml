name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Releases shouldn't be cancelled mid-upload by a follow-up tag push.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  desktop:
    name: Desktop - ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            # Universal binary covers both Apple Silicon and Intel from one .dmg.
            args: "--target universal-apple-darwin"
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # The .p8 API key has to live on disk for `tauri build` to read it;
      # write the secret's contents to a temp file and expose its path
      # via $GITHUB_ENV so the next step picks it up as APPLE_API_KEY_PATH.
      - name: Stage Apple API key
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p "$RUNNER_TEMP/apple"
          printf '%s' "${{ secrets.APPLE_API_KEY_CONTENT }}" > "$RUNNER_TEMP/apple/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/apple/AuthKey.p8" >> "$GITHUB_ENV"

      # tauri-action runs `tauri build`, uploads installers to a draft
      # release matching the tag, and creates the release if it doesn't
      # exist. Publish the draft manually after smoke-testing the binaries.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CI has no keychain, so the Developer ID cert is shipped in
          # as a base64-encoded .p12 secret; tauri-action imports it
          # into a temp keychain before signing.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # Let tauri-action read the signing identity from APPLE_CERTIFICATE
          # to avoid secret drift between cert subject and identity value.
          # Notarization via App Store Connect API key.
          # APPLE_API_KEY_PATH is set by the "Stage Apple API key" step.
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Beam ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
